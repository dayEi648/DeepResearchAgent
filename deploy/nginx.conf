# Nginx 配置文件 —— Deep Research Agent
#
# 用途：部署到阿里云 ECS 时，Nginx 作为反向代理和静态文件服务器。
# 前置条件：
#   1. 前端已构建（npm run build），产物在 frontend/DeepResearchAgent/dist/
#   2. 后端已启动（systemd 管理），监听 127.0.0.1:8000
#   3. 本文件通常放置在 /etc/nginx/sites-available/deepresearch，然后软链到 sites-enabled
#
# 注意：
#   - SSE 端点需要关闭代理缓冲（proxy_buffering off），否则流式推送会被缓存。
#   - SPA 路由需要 try_files 回退到 index.html，否则刷新页面会 404。

server {
    listen 80;
    server_name _;  # 接受所有域名（也可用你的实际域名替换）

    # 日志路径
    access_log /var/log/nginx/deepresearch.access.log;
    error_log /var/log/nginx/deepresearch.error.log;

    # --------------------------------------------------------------
    # 1. 前端静态文件（Vue 构建产物）
    # --------------------------------------------------------------
    location / {
        # 前端构建产物目录（部署时请根据实际情况修改）
        root /var/www/deepresearch/frontend/DeepResearchAgent/dist;
        index index.html;

        # SPA 路由回退：所有未知路径都返回 index.html，由 Vue Router 处理
        try_files $uri $uri/ /index.html;

        # 静态资源缓存（JS/CSS/图片等带 hash 的文件）
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # --------------------------------------------------------------
    # 2. API 反向代理 → FastAPI（Uvicorn @ 127.0.0.1:8000）
    # --------------------------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --------------------------------------------------------------
    # 3. SSE 流式端点（/research/ 前缀）
    # --------------------------------------------------------------
    # 注意：SSE 连接必须关闭缓冲和缓存，否则事件不会实时推送到前端。
    location /research/ {
        proxy_pass http://127.0.0.1:8000/research/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 关键配置
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # 支持 WebSocket（如需未来扩展）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --------------------------------------------------------------
    # 4. 健康检查（可选，直接透传）
    # --------------------------------------------------------------
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # --------------------------------------------------------------
    # 5. reports 本地静态文件（兜底/兼容旧数据）
    # --------------------------------------------------------------
    location /reports/ {
        alias /var/www/deepsearch/reports/;
        add_header Content-Type text/markdown;
    }
}
